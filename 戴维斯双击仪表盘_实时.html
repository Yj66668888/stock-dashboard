            font-weight: 600;

        .tier-btn:hover {
            border-color: #667eea;

        .stat-card .value {

        .table-container {

</head>

        let filteredData = [...stocksData];

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('stocks-tbody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="loading">没有找到匹配的标的</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(stock => {
                const changePercent = parseFloat(stock.change_percent);
                const changeClass = changePercent >= 0 ? 'change-positive' : 'change-negative';
                const changeSymbol = changePercent >= 0 ? '+' : '';
                
                const currentPrice = parseFloat(stock.price);
                const targetMid = stock.price_mid;
                const upside = targetMid ? ((targetMid - currentPrice) / currentPrice * 100) : 0;
                const upsideClass = upside > 50 ? 'upside-high' : upside > 20 ? 'upside-medium' : 'upside-low';
                
                const tierBadgeClass = stock.tier === 'tier1' ? 'tier1-badge' : 
                                      stock.tier === 'tier2' ? 'tier2-badge' : 
                                      stock.tier === 'tier3' ? 'tier3-badge' : 'tier4-badge';
                
                const tierLabel = stock.tier === 'tier1' ? '🟢 第一梯队' :

                                 stock.tier === 'tier3' ? '🟡 第三梯队' : '🔴 第四梯队';

                return `

                        <td><div class="stock-code">${stock.code}</div></td>
                        <td><strong>${stock.name}</strong></td>
                        <td>${stock.industry}</td>
                        <td><div class="price">${stock.price}</div></td>
                        <td class="${changeClass}">${changeSymbol}${stock.change_percent}%</td>
                        <td>${stock.pe_ratio}</td>
                        <td>

                                <span class="target-item target-low">${stock.price_low ? stock.price_low.toFixed(2) : '-'}</span>
                                <span class="target-item target-mid">${stock.price_mid ? stock.price_mid.toFixed(2) : '-'}</span>
                                <span class="target-item target-high">${stock.price_high ? stock.price_high.toFixed(2) : '-'}</span>
                            </div>
                        </td>
                        <td>
                            <div class="${upsideClass}">${upside.toFixed(1)}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.min(upside, 100)}%; background: ${upside > 50 ? '#e53e3e' : upside > 20 ? '#dd6b20' : '#38a169'}"></div>
                            </div>
                        </td>
                        <td><span class="theme-tag">${stock.theme}</span></td>
                    </tr>
                `;
            }).join('');

            updateStats(data);
        }

        // 更新统计数据
        function updateStats(data) {
            document.getElementById('total-count').textContent = data.length;
            
            const validPE = data.filter(s => parseFloat(s.pe_ratio) > 0);
            const avgPE = validPE.length > 0 ? 
                (validPE.reduce((sum, s) => sum + parseFloat(s.pe_ratio), 0) / validPE.length).toFixed(1) : 
                '-';
            document.getElementById('avg-pe').textContent = avgPE;
            
            const upCount = data.filter(s => parseFloat(s.change_percent) > 0).length;
            document.getElementById('up-count').textContent = `${upCount}/${data.length}`;
            
            const validUpside = data.filter(s => s.price_mid);
            const avgUpside = validUpside.length > 0 ?
                (validUpside.reduce((sum, s) => {
                    const current = parseFloat(s.price);
                    const target = s.price_mid;
                    return sum + (target - current) / current * 100;
                }, 0) / validUpside.length).toFixed(1) + '%' :
                '-';
            document.getElementById('avg-upside').textContent = avgUpside;
        }

                        stock.name.toLowerCase().includes(searchTerm) ||
                        stock.code.toLowerCase().includes(searchTerm) ||
                        stock.industry.toLowerCase().includes(searchTerm);
                    return matchTier && matchSearch;
                });
                
                renderTable(filteredData);
            });
        });

        // 搜索功能
        document.querySelector('.search-box').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const activeTier = document.querySelector('.tier-btn.active').dataset.tier;
            
            filteredData = stocksData.filter(stock => {
                const matchTier = activeTier === 'all' || stock.tier === activeTier;
                const matchSearch = !searchTerm || 
                    stock.name.toLowerCase().includes(searchTerm) ||
                    stock.code.toLowerCase().includes(searchTerm) ||
                    stock.industry.toLowerCase().includes(searchTerm);
                return matchTier && matchSearch;
            });
            
            renderTable(filteredData);
        });

        // 刷新数据
        function refreshData() {
            alert('数据已是最新（实时数据于 ' + new Date().toLocaleString('zh-CN') + ' 获取）\n\n如需更新实时行情，请重新运行数据获取脚本。');
        }

        // 初始化
        renderTable(stocksData);
        document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
