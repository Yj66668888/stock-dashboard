  if (tier === 'tier2') return '★★★★☆';
  if (tier === 'tier3') return '★★★☆☆';
  return '★★☆☆☆';
}

function getGainClass(pct) {
  if (pct >= 200) return 'gain-high';
  if (pct >= 100) return 'gain-medium';
  if (pct >= 30) return 'gain-low';
  if (pct > 0) return 'gain-verylow';
  return 'gain-negative-red';
}

function getTagClass(tier) {
  if (tier === 'tier1') return 'davis-tag';
  if (tier === 'tier2') return 'davis-tag tier2-tag';
  if (tier === 'tier3') return 'davis-tag tier3-tag';
  return 'davis-tag tier4-tag';
}

function getTagText(tier) {
  if (tier === 'tier1') return '戴维斯双击';
  if (tier === 'tier2') return '戴维斯双击';
  if (tier === 'tier3') return '戴维斯双击';
  return '不具备双击';
}

function formatGain(pct) {
  if (!pct || isNaN(pct)) return '<span class="dash">—</span>';
  const sign = pct > 0 ? '+' : '';
  const cls = getGainClass(pct);
  return `<span class="${cls}">${sign}${pct.toFixed(0)}%</span>`;
}

function formatVal(val, suffix) {
  if (!val || val === '—') return '<span class="dash">—</span>';
  if (suffix === '×') return `<span class="pe-value">${val}</span>`;
  if (suffix === '%') return `<span class="roe-value">${val}</span>`;
  return val;
}

function formatGrowth(val) {
  if (!val || val === '—') return '<span class="dash">—</span>';
  const num = parseFloat(val);
  if (isNaN(num)) return '<span class="dash">—</span>';
  const cls = num > 0 ? 'growth-value' : 'growth-negative';
  const sign = num > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${val}%</span>`;
}

function renderTier(tier) {
  const items = stocks.filter(s => s.tier === tier);
  const count = items.length;
  document.getElementById(tier + '-count').textContent = count + '只';

  // thead
  const thead = document.getElementById(tier + '-thead');
  thead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

  // tbody
  const tbody = document.getElementById(tier + '-tbody');
  if (count === 0) {
    tbody.innerHTML = '<tr><td colspan="13" class="empty-state">暂无标的</td></tr>';
    return;
  }

  tbody.innerHTML = items.map((s, idx) => {
    const price = parseFloat(s.price);
    const gainLow = s.price_low ? ((s.price_low - price) / price * 100) : 0;
    const gainMid = s.price_mid ? ((s.price_mid - price) / price * 100) : 0;
    const gainHigh = s.price_high ? ((s.price_high - price) / price * 100) : 0;

    const pe2026 = s.pe_ratio ? (parseFloat(s.pe_ratio) * 0.8).toFixed(1) : '—';
    const valuation = s.pe_ratio ? (parseFloat(s.pe_ratio) < 15 ? '低' : parseFloat(s.pe_ratio) < 30 ? '中' : '高') : '—';

    return `<tr>
      <td>${idx + 1}</td>
      <td>${s.name}</td>
      <td><span class="star">${getStars(tier)}</span></td>
      <td>${s.price}</td>
      <td>${formatVal(s.pe_ratio, '×')}</td>
      <td>${formatVal(pe2026, '×')}</td>
      <td>${valuation}</td>
      <td>${formatGrowth(s.growth_est)}</td>
      <td>${formatVal(s.roe_est, '%')}</td>
      <td>${formatGain(gainLow)}</td>
      <td>${formatGain(gainMid)}</td>
      <td>${formatGain(gainHigh)}</td>
      <td class="theme-cell"><span class="${getTagClass(tier)}">${getTagText(tier)}</span> ${s.theme}</td>
    </tr>`;
  }).join('');
}

function toggleTier(header) {
  const card = header.closest('.tier-card');
  card.classList.toggle('collapsed');
}

function updateStats() {
  const tier1 = stocks.filter(s => s.tier === 'tier1').length;
  const tier2 = stocks.filter(s => s.tier === 'tier2').length;
  const tier3 = stocks.filter(s => s.tier === 'tier3').length;
  const tier4 = stocks.filter(s => s.tier === 'tier4').length;
  document.getElementById('stat-tier1').textContent = tier1;
  document.getElementById('stat-tier2').textContent = tier2;
  document.getElementById('stat-tier3').textContent = tier3;
  document.getElementById('stat-hot').textContent = tier4;
}

function updateTime() {
  const now = new Date();
  const timeStr = now.toTimeString().slice(0, 8);
  document.getElementById('last-update').textContent = timeStr;
}

// init
renderTier('tier1');
renderTier('tier2');
renderTier('tier3');
renderTier('tier4');
updateStats();
updateTime();
</script>
</body>
</html>
