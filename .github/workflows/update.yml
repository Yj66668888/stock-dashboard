name: 每日14点选股池更新

on:
  schedule:
    # 北京时间14:00 = UTC 06:00，周一至周五
    - cron: '0 6 * * 1-5'
  workflow_dispatch:  # 允许手动触发

# 赋予写入权限以便提交变更
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 执行自动更新脚本
        run: python auto_update.py

      - name: 提交变更
        run: |
          git config user.name "Stock Bot"
          git config user.email "bot@stock-dashboard.local"
          git add stocks.json davis_dashboard_v5.html docs/
          if git diff --staged --quiet; then
            echo "📭 无变更，跳过提交"
          else
            git commit -m "📊 自动更新选股池 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ 变更已提交"
          fi

      - name: 部署到 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
