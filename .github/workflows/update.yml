name: 每日14点选股池更新

on:
  schedule:
    # 北京时间14:00 = UTC 06:00，周一至周五
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 执行自动更新脚本
        run: python auto_update.py

      - name: 提交选股池变更（不覆盖docs/，由本地自动化推送完整HTML）
        run: |
          git config user.name 'Stock Bot'
          git config user.email 'bot@stock-dashboard.local'
          git add stocks.json
          if git diff --staged --quiet; then
            echo '📭 选股池无变更，跳过提交'
          else
            git commit -m "📊 自动更新选股池 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
            echo '✅ 选股池已更新'
          fi

      - name: 重新部署GitHub Pages（取最新docs/内容）
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
