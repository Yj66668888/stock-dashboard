  /* Header */
  .hdr { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:16px; }
  .hdr h1 { font-size:20px; font-weight:700; }
  .hdr .sub { font-size:13px; color:var(--text2); }
  .hdr-right { display:flex; align-items:center; gap:12px; }
  .refresh-btn { background:var(--accent); color:#fff; border:none; padding:7px 16px; border-radius:6px; font-size:13px; cursor:pointer; }
  .refresh-btn:hover { opacity:.85; }
  .last-update { font-size:12px; color:var(--text2); }

  /* Filter bar */
  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .filter-btn { padding:5px 14px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:13px; cursor:pointer; }

  .search-inp { padding:5px 12px; border-radius:6px; border:1px solid var(--border); font-size:13px; width:180px; }

  /* Table */
  .tbl-wrap { background:#fff; border-radius:10px; border:1px solid var(--border); overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:#f8f9fb; position:sticky; top:0; z-index:2; padding:9px 10px; text-align:left; font-weight:600; color:var(--text2); font-size:12px; border-bottom:2px solid var(--border); white-space:nowrap; }
  thead th.sortable { cursor:pointer; }
  thead th.sortable:hover { background:#eef0f5; }
  tbody td { padding:8px 10px; border-bottom:1px solid #f0f1f4; vertical-align:middle; }
  tbody tr:hover { background:#f8faff; }
  .tier-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .tier1 { background:var(--tier1); color:var(--tier1-b); }
  .tier2 { background:var(--tier2); color:var(--tier2-b); }
  .tier3 { background:var(--tier3); color:var(--tier3-b); }
  .tier4 { background:var(--tier4); color:var(--tier4-b); }

  .davis-stars { font-size:13px; white-space:nowrap; }
  .star-on { color:#f59e0b; }
  .star-off { color:#d1d5db; }

  .price-up { color:var(--red); font-weight:600; }
  .price-down { color:var(--green); font-weight:600; }
  .price-flat { color:var(--text2); }

  .pct-bar-wrap { display:flex; align-items:center; gap:6px; }
  .pct-bar { height:6px; border-radius:3px; min-width:3px; }

  .notes-cell { max-width:200px; font-size:12px; color:var(--text2); line-height:1.4; }

  .loading-cover { position:absolute; inset:0; background:rgba(255,255,255,.65); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--text2); z-index:3; display:none; }

  .stats-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:12px 18px; min-width:140px; }
  .stat-card .label { font-size:12px; color:var(--text2); margin-bottom:4px; }
  .stat-card .value { font-size:20px; font-weight:700; }

  .no-data { text-align:center; padding:40px; color:var(--text2); font-size:14px; }

  @media(max-width:768px) {
    .page { padding:12px; }
    table { font-size:12px; }
    thead th, tbody td { padding:6px 6px; }

</style>

// ============ 实时行情获取 ===========
let currentFilter = 'all';
let currentSearch = '';

function fmtCode(ws) {
  // sh600519, sz000001, hk00700
  return ws;
}

function buildQs() {
  return STOCKS.map(s => s.ws).join(',');
}

async function fetchAllQuotes() {
  const cover = document.getElementById('loadingCover');
  cover.style.display = 'flex';
  const qs = buildQs();
  // Tencent qt.gtimg.cn API
  const url = `https://qt.gtimg.cn/q=${qs}`;
  try {
    const resp = await fetch(url);
    const text = await resp.text();
    parseAndUpdate(text);
  } catch(e) {
    console.error('Fetch failed:', e);
    // Fallback: try with JSONP approach
    fetchWithJsonP(qs);
    return;
  }
  cover.style.display = 'none';
  document.getElementById('lastUpdate').textContent = '最后刷新：' + new Date().toLocaleTimeString('zh-CN');
}

function fetchWithJsonP(qs) {
  const scriptId = 'jsonp_script';
  const old = document.getElementById(scriptId);
  if (old) old.remove();
  const cbName = 'cb_' + Math.random().toString(36).substr(2, 8);
  window[cbName] = function(text) {
    parseAndUpdate(text);
    document.getElementById('loadingCover').style.display = 'none';
    document.getElementById('lastUpdate').textContent = '最后刷新：' + new Date().toLocaleTimeString('zh-CN');
    delete window[cbName];
  };
  const s = document.createElement('script');
  s.id = scriptId;
  s.src = `https://qt.gtimg.cn/q=${qs}&cb=${cbName}`;
  document.body.appendChild(s);
}

function parseAndUpdate(text) {
  // Tencent API returns: v_sh600519="51~600519~贵州茅台~price~change~chgPct~...";
  const lines = text.split('\n');
  const priceMap = {};
  const chgMap = {};
  const chgPctMap = {};
  for (const line of lines) {
    const m = line.match(/v_(\w+)="([^"]+)"/);
    if (!m) continue;
    const wsCode = m[1];
    const fields = m[2].split('~');
    // fields: [0]type [1]code [2]name [3]price [4]change [5]chgPct [6]open [7]preClose [8]vol [9]time [10]high [11]low ...
    const price = parseFloat(fields[3]);
    const chg = parseFloat(fields[4]);
    const chgPct = parseFloat(fields[5]);
    if (!isNaN(price)) priceMap[wsCode] = price;
    if (!isNaN(chg)) chgMap[wsCode] = chg;
    if (!isNaN(chgPct)) chgPctMap[wsCode] = chgPct;
  }
  // Update STOCKS array
  for (const s of STOCKS) {
    if (priceMap[s.ws] !== undefined) {
      s.price_realtime = priceMap[s.ws];
      s.chg = chgMap[s.ws];
      s.chgPct = chgPctMap[s.ws];
    }
  }
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const noData = document.getElementById('noData');
  tbody.innerHTML = '';

  let filtered = STOCKS.filter(s => {
    if (currentFilter !== 'all' && s.tier !== currentFilter) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      return s.name.toLowerCase().includes(q) || s.code.includes(q) || s.industry.toLowerCase().includes(q);
    }
    return true;
  });

  if (filtered.length === 0) {
    noData.style.display = 'block';
    updateStats();
    return;
  }
  noData.style.display = 'none';

  for (const s of filtered) {
    const tr = document.createElement('tr');

    const price = s.price_realtime != null ? s.price_realtime : s.price_static;
    const hasLive = s.price_realtime != null;
    const liveTag = hasLive ? ' 🟢' : '';
    const chg = s.chg;
    const chgPct = s.chgPct;
    let chgClass = 'price-flat';
    let chgStr = '';
    if (chg > 0) chgClass = 'price-up';
    else if (chg < 0) chgClass = 'price-down';
    if (chg != null) chgStr = `<span class="${chgClass}">${chg > 0 ? '+' : ''}${chg.toFixed(2)} (${(chgPct * 100).toFixed(2)}%)</span>`;
    else chgStr = `<span class="price-flat">—</span>`;

    const midUpside = s.mid ? ((s.mid / price - 1) * 100).toFixed(1) : '—';
    const midUpsideNum = s.mid ? (s.mid / price - 1) * 100 : 0;
    const upsideColor = midUpsideNum > 100 ? 'var(--red)' : midUpsideNum > 50 ? 'var(--amber)' : 'var(--green)';

    const davisHtml = renderDavis(s.davis);

    const tierLabel = {'tier1':'🟢 第一梯队','tier2':'🔵 第二梯队','tier3':'🟡 第三梯队','tier4':'🔴 第四梯队'}[s.tier];
    const tierClass = {'tier1':'tier1','tier2':'tier2','tier3':'tier3','tier4':'tier4'}[s.tier];

    tr.innerHTML = `
      <td>${s.seq}</td>
      <td><span class="tier-tag ${tierClass}">${tierLabel}</span></td>
      <td><strong>${s.name}</strong>${liveTag}</td>
      <td>${s.code}</td>
      <td>${s.industry}</td>
      <td><span class="${chgClass}" style="font-weight:600">${price.toFixed(2)}</span>${hasLive ? '<span style="font-size:10px;color:var(--text2)"> 实时</span>' : ''}</td>
      <td>${chgStr}</td>
      <td>${s.low || '—'}</td>
      <td><strong>${s.mid || '—'}</strong></td>
      <td>${s.high || '—'}</td>
      <td>
        <div class="pct-bar-wrap">
          <div class="pct-bar" style="width:${Math.min(Math.abs(midUpsideNum), 200)}px; background:${upsideColor};"></div>
          <span style="font-weight:600;color:${upsideColor}">${midUpside !== '—' ? midUpside + '%' : '—'}</span>
        </div>
      </td>
      <td>${s.pe || '—'}</td>
      <td>${s.pe_pct || '—'}</td>
      <td>${davisHtml}</td>
      <td>${s.cycle || '—'}</td>
      <td class="notes-cell">${s.theme || '—'}</td>
    `;
    tbody.appendChild(tr);
  }
  updateStats();
}

function renderDavis(d) {
  if (!d) return '—';
  let html = '';
  // Count stars
  const starMatch = d.match(/★/g);
  const emptyMatch = d.match(/☆/g);
  const stars = starMatch ? starMatch.length : 0;
  const empties = emptyMatch ? emptyMatch.length : 0;
  for (let i = 0; i < stars; i++) html += '<span class="star-on">★</span>';
  for (let i = 0; i < empties; i++) html += '<span class="star-off">☆</span>';
  // Add note
  const note = d.replace(/[★☆]/g, '').trim();
  if (note) html += `<span style="font-size:11px;color:var(--text2);margin-left:4px;">${note}</span>`;
  return html;
}

function updateStats() {
  const all = STOCKS;
  document.getElementById('cnt1').textContent = all.filter(s=>s.tier==='tier1').length;
  document.getElementById('cnt2').textContent = all.filter(s=>s.tier==='tier2').length;
  document.getElementById('cnt3').textContent = all.filter(s=>s.tier==='tier3').length;
  document.getElementById('cnt4').textContent = all.filter(s=>s.tier==='tier4').length;
}

function filterTier(tier, btn) {
  currentFilter = tier;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function searchTable(val) {
  currentSearch = val;
  renderTable();
}

// ============ 初始化 ===========
renderTable();
// Auto fetch on load
fetchAllQuotes();
// Auto refresh every 60 seconds
setInterval(fetchAllQuotes, 60000);
</script>
